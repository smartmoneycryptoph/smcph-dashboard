# dashboard.smartmoneycryptoph.tech — Dashboard (Telegram Mini App)
# Place at: /etc/nginx/sites-available/dashboard.smartmoneycryptoph.tech
# Enable:   ln -s /etc/nginx/sites-available/dashboard.smartmoneycryptoph.tech /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name dashboard.smartmoneycryptoph.tech;
    return 301 https://dashboard.smartmoneycryptoph.tech$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dashboard.smartmoneycryptoph.tech;

    ssl_certificate     /etc/letsencrypt/live/dashboard.smartmoneycryptoph.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.smartmoneycryptoph.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Root -> dashboard (Telegram Mini App entry point)
    location = / {
        return 302 /dashboard;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
