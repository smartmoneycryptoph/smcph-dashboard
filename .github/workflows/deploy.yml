name: Deploy Dashboard to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add host to known_hosts
        run: ssh-keyscan -H -T 10 ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            root@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd /opt/smcph-dashboard
            git pull origin main
            npm install --production=false
            npm run build
            pm2 restart smcph-dashboard || pm2 start npm --name "smcph-dashboard" -- start -- -p 3000
            pm2 save
            sleep 5
            pm2 show smcph-dashboard | grep -E "status|restart" || true
            echo "SUCCESS: dashboard deployed"
          EOF
